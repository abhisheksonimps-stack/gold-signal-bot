name: PDH PDL Signal Bot (Gold + Petal)

# NOTE: Koi apna schedule NAHI hai. Sirf cron-job.org trigger karta hai
# (har 15 min) via workflow_dispatch. Conflict avoid karne ke liye.
on:
  workflow_dispatch:   # cron-job.org / manual trigger

# Ek hi run ek baar mein chale (overlapping runs avoid)
concurrency:
  group: signal-bot
  cancel-in-progress: false

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # Dedup state ko runs ke beech yaad rakhne ke liye cache
      # (taaki ek confirmation candle pe ek hi Telegram message aaye)
      - name: Restore signal state
        uses: actions/cache@v4
        with:
          path: last_signals.json
          key: signal-state-${{ github.run_id }}
          restore-keys: |
            signal-state-

      - name: Run signal bot
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_TOKEN:     ${{ secrets.UPSTOX_TOKEN }}
        run: python signal.py
